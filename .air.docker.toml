root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/serve ./cmd/serve"
  bin = "./tmp/serve"
  full_bin = "sh -c './tmp/serve --compose ${COMPOSE_FILE:-examples/b2b-payments/compose.yaml} --watch --port ${PORT:-3000}'"
  include_ext = ["go"]
  exclude_dir = ["tmp", "runtime", "flutter_runtime", "node_modules", "docs"]
  delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true
